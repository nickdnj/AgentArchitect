<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Saltwater fish — stylized silhouette in brand navy with a red accent for the eye/gill -->
  <rect width="64" height="64" rx="12" fill="#1a3a5c"/>
  <!-- Fish body -->
  <path d="M 10 32
           Q 16 20, 30 20
           Q 44 20, 50 28
           L 56 22
           L 56 42
           L 50 36
           Q 44 44, 30 44
           Q 16 44, 10 32 Z"
        fill="#faf7f2"/>
  <!-- Eye (red accent matching the brand red) -->
  <circle cx="20" cy="29" r="2" fill="#c8102e"/>
  <!-- Subtle gill line -->
  <path d="M 26 25 Q 29 32 26 39" stroke="#1a3a5c" stroke-width="1.2" fill="none" opacity="0.4"/>
</svg>
