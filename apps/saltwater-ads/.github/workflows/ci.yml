name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
        env:
          NODE_ENV: test

      - name: Verify no console.* in src/lib (other than secrets boot warnings)
        run: |
          # Allow console.warn in secrets.ts (boot-time warnings before pino init)
          # and the comment-reference in lib/log.ts
          STRAYS=$(grep -rn "console\." src lib 2>/dev/null | grep -v "secrets.ts:" | grep -v "lib/log.ts:" || true)
          if [ -n "$STRAYS" ]; then
            echo "Stray console.* calls found:"
            echo "$STRAYS"
            exit 1
          fi
          echo "✓ No stray console.* calls"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SPA
        run: bun run build:web

      - name: Verify dist/web exists
        run: |
          if [ ! -d dist/web ]; then
            echo "dist/web missing after build"
            exit 1
          fi
          echo "Build artifacts:"
          ls -la dist/web/
