<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Apple touch / PWA maskable icon. Maskable safe zone is the inner 80% (radius 72 from
       center 90); all art stays inside that region so Android round/squircle masks don't crop. -->
  <rect width="180" height="180" rx="34" fill="#ffffff"/>
  <!-- Fish body, scaled and centered slightly above middle to leave room for wordmark -->
  <g transform="translate(26 30)" fill="#3FCFD8">
    <ellipse cx="72" cy="40" rx="55" ry="26"/>
    <!-- Tail -->
    <path d="M 17 40 L 4 16 L 4 64 Z"/>
    <!-- Top dorsal fin -->
    <path d="M 56 16 Q 72 -3 88 18 Q 72 22 56 16 Z"/>
    <!-- Bottom anal fin -->
    <path d="M 56 64 Q 72 84 88 62 Q 72 58 56 64 Z"/>
  </g>
  <!-- Eye -->
  <circle cx="135" cy="68" r="5" fill="#0F2D3D"/>
  <!-- Gill curve -->
  <path d="M 122 60 Q 118 70 122 80" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.7"/>
  <!-- Wordmark -->
  <text x="90" y="148" font-family="Georgia, 'Times New Roman', serif" font-style="italic"
        font-size="26" font-weight="500" fill="#7BE0A1" text-anchor="middle">Saltwater</text>
</svg>
