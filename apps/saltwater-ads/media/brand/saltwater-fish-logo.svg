<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Saltwater fish — cyan silhouette on white rounded square. Brand colors lifted from the
       2026 Saltwater wordmark logo (cyan #3FCFD8, lime accent #7BE0A1). -->
  <rect width="64" height="64" rx="12" fill="#ffffff"/>
  <g fill="#3FCFD8">
    <!-- Body: rounded fish shape facing right -->
    <ellipse cx="36" cy="32" rx="22" ry="11"/>
    <!-- Tail: split V on the left -->
    <path d="M 14 32 L 6 21 L 6 43 Z"/>
    <!-- Top dorsal fin -->
    <path d="M 30 21 Q 36 12 42 22 Q 36 23 30 21 Z"/>
    <!-- Bottom anal fin -->
    <path d="M 30 43 Q 36 52 42 42 Q 36 41 30 43 Z"/>
  </g>
  <!-- Eye (head is on the right) -->
  <circle cx="50" cy="30" r="2" fill="#0F2D3D"/>
  <!-- Gill curve -->
  <path d="M 44 26 Q 42 32 44 38" stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.7"/>
</svg>
