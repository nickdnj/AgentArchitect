<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bob's Grill School — Storyboards</title>
<style>
  :root{
    --navy:#0b2c42; --navy2:#123c5b; --seafoam:#2bb597; --seafoam-l:#7bdac4;
    --sand:#f4ede3; --foam:#f7f9fb; --ink:#1d2933; --muted:#5f7386;
    --line:#e3e8ee; --card:#ffffff; --warn:#c0492b; --ok:#1f9d6b;
    --shadow:0 1px 3px rgba(11,44,66,.08),0 8px 24px rgba(11,44,66,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:var(--ink);background:var(--foam);line-height:1.45}
  a{color:var(--navy2)}
  header.top{background:linear-gradient(135deg,var(--navy2),var(--navy));color:#fff;padding:18px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
  header.top .wave{font-size:28px}
  header.top h1{font-size:18px;font-weight:800;letter-spacing:.01em}
  header.top .meta{margin-left:auto;text-align:right;font-size:12px;color:var(--seafoam-l)}
  #saveState{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;background:rgba(255,255,255,.14)}
  #saveState.saving{color:#ffe08a}#saveState.saved{color:var(--seafoam-l)}#saveState.err{color:#ff9b88}

  nav.tabs{display:flex;gap:6px;flex-wrap:wrap;padding:12px 24px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:60px;z-index:40}
  nav.tabs button{font:inherit;font-size:13px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--navy);padding:8px 14px;border-radius:999px;cursor:pointer;transition:.12s}
  nav.tabs button:hover{border-color:var(--seafoam)}
  nav.tabs button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  nav.tabs button.shotlist{margin-left:auto;background:var(--seafoam);color:#04231b;border-color:var(--seafoam)}
  nav.tabs button.shotlist.active{background:var(--navy);color:#fff;border-color:var(--navy)}

  main{max-width:980px;margin:0 auto;padding:24px}
  .ep-head{background:var(--navy);color:#fff;border-radius:16px;padding:22px 26px;margin-bottom:22px}
  .ep-head .num{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--seafoam-l)}
  .ep-head h2{font-size:26px;margin:4px 0 2px}
  .ep-head .lvl{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;background:rgba(255,255,255,.15);padding:3px 9px;border-radius:999px;margin-right:8px}
  .ep-head .obj{margin-top:12px;color:rgba(255,255,255,.9);max-width:62ch}
  .ep-head .take{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px}
  .ep-head .take span{font-size:12px;background:rgba(123,218,196,.16);color:var(--seafoam-l);border:1px solid rgba(123,218,196,.3);padding:4px 10px;border-radius:999px}

  .page{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
  .page-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--sand);border-bottom:1px solid var(--line)}
  .pgnum{font-weight:800;color:var(--navy);background:#fff;border:2px solid var(--navy);border-radius:8px;min-width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:14px}
  .typetoggle{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .typetoggle button{font:inherit;font-size:12px;font-weight:600;border:0;background:#fff;color:var(--muted);padding:6px 12px;cursor:pointer}
  .typetoggle button.on[data-t=video]{background:var(--navy);color:#fff}
  .typetoggle button.on[data-t=image]{background:var(--seafoam);color:#04231b}
  .shotid-in{font:inherit;font-weight:700;color:var(--navy);width:64px;border:1px solid var(--line);border-radius:8px;padding:6px 8px;text-align:center}
  .vbadge{font-size:11px;font-weight:700;color:#04231b;background:var(--seafoam-l);border-radius:999px;padding:3px 9px;display:none}
  .vbadge.on{display:inline-block}
  .pg-actions{margin-left:auto;display:flex;gap:6px}
  .pg-actions button{font:inherit;font-size:12px;border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 9px;cursor:pointer;color:var(--muted)}
  .pg-actions button:hover{border-color:var(--navy);color:var(--navy)}
  .pg-actions button.del:hover{border-color:var(--warn);color:var(--warn)}

  .page-body{display:grid;grid-template-columns:300px 1fr;gap:0}
  @media(max-width:720px){.page-body{grid-template-columns:1fr}}
  .assetslot{padding:14px;border-right:1px solid var(--line);background:#fafcfe;display:flex;flex-direction:column;gap:8px}
  .drop{border:2px dashed var(--line);border-radius:10px;min-height:170px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;padding:14px;transition:.12s}
  .drop:hover,.drop.over{border-color:var(--seafoam);background:#f0fbf7;color:var(--navy)}
  .drop .big{font-size:30px;margin-bottom:6px}
  .assetslot img,.assetslot video{width:100%;border-radius:10px;display:block;background:#000}
  .assetslot .fname{font-size:11px;color:var(--muted);word-break:break-all}
  .assetslot .rm{font:inherit;font-size:12px;color:var(--warn);background:none;border:0;cursor:pointer;align-self:flex-start}

  .fields{padding:14px 16px;display:grid;gap:10px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:720px){.row{grid-template-columns:1fr}}
  .f label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px}
  .f input,.f select,.f textarea{font:inherit;width:100%;border:1px solid var(--line);border-radius:8px;padding:7px 9px;color:var(--ink);background:#fff}
  .f textarea{resize:vertical;min-height:42px}
  .f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--seafoam);box-shadow:0 0 0 3px rgba(43,181,151,.12)}
  .line-in{font-style:italic}
  .checkrow{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink)}
  .checkrow input{width:auto}

  .addpage{width:100%;border:2px dashed var(--line);background:#fff;color:var(--muted);font:inherit;font-weight:600;padding:12px;border-radius:12px;cursor:pointer}
  .addpage:hover{border-color:var(--seafoam);color:var(--navy)}

  /* shot list */
  .sl-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
  .sl-head h2{font-size:24px;color:var(--navy)}
  .printbtn{font:inherit;font-weight:700;background:var(--navy);color:#fff;border:0;border-radius:10px;padding:10px 18px;cursor:pointer}
  .printbtn:hover{background:var(--navy2)}
  .callout{background:var(--sand);border:1px solid #e6dccd;border-radius:12px;padding:14px 18px;margin-bottom:16px}
  .callout h3{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--navy);margin-bottom:8px}
  .callout ul{margin:0 0 0 18px;font-size:14px;color:var(--ink)}
  .callout .note{font-size:14px;color:var(--ink)}
  .block{margin-bottom:22px}
  .block h3{font-size:15px;color:#fff;background:var(--navy2);border-radius:8px;padding:8px 12px;margin-bottom:0}
  table.shots{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid var(--line);border-top:0}
  table.shots th{background:#eef3f7;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:7px 8px;border-bottom:1px solid var(--line)}
  table.shots td{padding:8px;border-bottom:1px solid var(--line);vertical-align:top}
  table.shots tr:last-child td{border-bottom:0}
  td.id{font-weight:800;color:var(--navy);white-space:nowrap}
  td.v{text-align:center;color:var(--seafoam);font-weight:800}
  td.done{text-align:center}
  td.done input{width:18px;height:18px}
  .gs{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:999px;white-space:nowrap}
  .gs-unlit{background:#eef1f4;color:#5f7386}.gs-lighting{background:#fde9d9;color:#b25a25}
  .gs-ready-gray{background:#e7e4ec;color:#6b5e86}.gs-cooking{background:#fce1df;color:#b23b34}
  .gs-cooldown{background:#dff1ea;color:#1f7d5e}.gs-na{background:#eef3f7;color:#7e8a96}

  .empty{padding:60px 20px;text-align:center;color:var(--muted)}
  .hidden{display:none!important}

  @media print{
    header.top,nav.tabs,.printbtn,.pg-actions,.addpage{display:none!important}
    body{background:#fff}
    main{max-width:none;padding:0}
    .block{break-inside:avoid}
    table.shots tr{break-inside:avoid}
    .callout{break-inside:avoid}
    @page{size:letter;margin:0.5in}
  }
</style>
</head>
<body>
<header class="top">
  <span class="wave">🔥</span>
  <h1>Bob's Grill School — Storyboards</h1>
  <div class="meta">
    <div id="projmeta">loading…</div>
    <span id="saveState" class="saved">ready</span>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>
<main id="view"><div class="empty">Loading storyboard…</div></main>

<script>
const GS_LABELS = {unlit:"Unlit",lighting:"Lighting",cooking:"Cooking","ready-gray":"Ready · gray",cooldown:"Cool-down","n/a":"—"};
const SHOT_TYPES = ["WS","MWS","MS","MCU","CU","ECU","OTS","POV","TITLE","INSERT"];
let DATA=null, CUR="ep0", saveTimer=null;

async function load(){
  try{
    const r = await fetch("/storyboard-data.json",{cache:"no-store"});
    if(!r.ok) throw new Error("no data ("+r.status+")");
    DATA = await r.json();
  }catch(e){
    document.getElementById("view").innerHTML =
      '<div class="empty">No <code>storyboard-data.json</code> yet.<br>The Video Script Writer is still generating it — reload in a moment.<br><small>'+e.message+'</small></div>';
    return;
  }
  DATA.episodes = DATA.episodes||[];
  document.getElementById("projmeta").textContent =
    (DATA.project||"Storyboards")+(DATA.date?" · "+DATA.date:"");
  buildTabs();
  if(CUR==="ep0" && DATA.episodes[0]) CUR="ep"+DATA.episodes[0].num;
  render();
}

function buildTabs(){
  const t=document.getElementById("tabs"); t.innerHTML="";
  DATA.episodes.forEach(ep=>{
    const b=document.createElement("button");
    b.textContent="Ep "+ep.num;
    b.title=ep.title;
    b.dataset.k="ep"+ep.num;
    b.onclick=()=>{CUR=b.dataset.k;render()};
    t.appendChild(b);
  });
  if(DATA.shotList){
    const s=document.createElement("button");
    s.textContent="📋 Master Shot List";
    s.className="shotlist"; s.dataset.k="shotlist";
    s.onclick=()=>{CUR="shotlist";render()};
    t.appendChild(s);
  }
}

function render(){
  [...document.querySelectorAll("nav.tabs button")].forEach(b=>b.classList.toggle("active",b.dataset.k===CUR));
  window.scrollTo(0,0);
  if(CUR==="shotlist") return renderShotList();
  const num=parseInt(CUR.replace("ep",""),10);
  const ep=DATA.episodes.find(e=>e.num===num);
  if(!ep){document.getElementById("view").innerHTML='<div class="empty">Episode not found.</div>';return}
  renderEpisode(ep);
}

/* ---------- Episode storyboard (one asset per page) ---------- */
function renderEpisode(ep){
  const v=document.getElementById("view");
  v.innerHTML="";
  const head=document.createElement("div");
  head.className="ep-head";
  head.innerHTML=`<div class="num">Episode ${ep.num}${ep.runtime?" · "+ep.runtime:""}</div>
    <h2>${esc(ep.title||"")}</h2>
    <div>${ep.level?`<span class="lvl">${esc(ep.level)}</span>`:""}</div>
    <div class="obj">${esc(ep.objective||"")}</div>
    <div class="take">${(ep.takeaways||[]).map(t=>`<span>✓ ${esc(t)}</span>`).join("")}</div>`;
  v.appendChild(head);

  ep.pages = ep.pages||[];
  ep.pages.forEach((pg,i)=>v.appendChild(pageCard(ep,pg,i)));

  const add=document.createElement("button");
  add.className="addpage"; add.textContent="+ Add page";
  add.onclick=()=>{ep.pages.push({page:ep.pages.length+1,type:"video",shotId:"",time:"",shotType:"MS",framing:"",action:"",line:"",onScreenText:"",vertical:false,grillState:"n/a",notes:""});renumber(ep);queueSave();renderEpisode(ep)};
  v.appendChild(add);
}

function pageCard(ep,pg,idx){
  const c=document.createElement("div"); c.className="page";
  // bar
  const bar=document.createElement("div"); bar.className="page-bar";
  bar.innerHTML=`<div class="pgnum">${pg.page||idx+1}</div>`;
  const tg=document.createElement("div"); tg.className="typetoggle";
  ["video","image"].forEach(tt=>{
    const b=document.createElement("button"); b.dataset.t=tt;
    b.textContent=tt==="video"?"🎬 Video":"🖼 Image/Slide";
    if((pg.type||"video")===tt)b.classList.add("on");
    b.onclick=()=>{pg.type=tt;queueSave();renderEpisode(ep)};
    tg.appendChild(b);
  });
  bar.appendChild(tg);
  const sid=document.createElement("input"); sid.className="shotid-in"; sid.value=pg.shotId||""; sid.placeholder="ID";
  sid.title="Shot ID (links to master shot list)";
  sid.oninput=()=>{pg.shotId=sid.value;queueSave()};
  bar.appendChild(sid);
  const vb=document.createElement("span"); vb.className="vbadge"+(pg.vertical?" on":""); vb.textContent="9:16 grab";
  bar.appendChild(vb);
  const act=document.createElement("div"); act.className="pg-actions";
  const up=mkbtn("↑",()=>{if(idx>0){[ep.pages[idx-1],ep.pages[idx]]=[ep.pages[idx],ep.pages[idx-1]];renumber(ep);queueSave();renderEpisode(ep)}});
  const dn=mkbtn("↓",()=>{if(idx<ep.pages.length-1){[ep.pages[idx+1],ep.pages[idx]]=[ep.pages[idx],ep.pages[idx+1]];renumber(ep);queueSave();renderEpisode(ep)}});
  const del=mkbtn("Delete",()=>{if(confirm("Delete page "+(pg.page||idx+1)+"?")){ep.pages.splice(idx,1);renumber(ep);queueSave();renderEpisode(ep)}});
  del.className="del";
  act.append(up,dn,del); bar.appendChild(act);
  c.appendChild(bar);

  // body
  const body=document.createElement("div"); body.className="page-body";
  body.appendChild(assetSlot(ep,pg));
  body.appendChild(fields(ep,pg));
  c.appendChild(body);
  return c;
}

function assetSlot(ep,pg){
  const s=document.createElement("div"); s.className="assetslot";
  const kind=pg.type||"video";
  const a=pg.asset; // {path,type}
  if(a&&a.path){
    if((a.type||kind)==="video"){
      const vid=document.createElement("video"); vid.src="/"+a.path; vid.controls=true; s.appendChild(vid);
    }else{
      const img=document.createElement("img"); img.src="/"+a.path; img.alt=pg.shotId||""; s.appendChild(img);
    }
    const fn=document.createElement("div"); fn.className="fname"; fn.textContent=a.path.split("/").pop(); s.appendChild(fn);
    const rm=document.createElement("button"); rm.className="rm"; rm.textContent="✕ Remove asset";
    rm.onclick=async()=>{
      if(!confirm("Remove this asset?"))return;
      try{await fetch("/delete-asset",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path:a.path})});}catch(e){}
      delete pg.asset; queueSave(); renderEpisode(ep);
    };
    s.appendChild(rm);
  }else{
    const drop=document.createElement("label"); drop.className="drop";
    drop.innerHTML=`<div class="big">${kind==="video"?"🎬":"🖼"}</div>
      <div><b>Drop ${kind==="video"?"a video clip":"an image"}</b><br>or click to choose</div>
      <div style="font-size:11px;margin-top:6px">one ${kind} per page</div>`;
    const inp=document.createElement("input"); inp.type="file"; inp.className="hidden";
    inp.accept = kind==="video" ? "video/*" : "image/*";
    drop.appendChild(inp);
    inp.onchange=()=>{if(inp.files[0])uploadAsset(ep,pg,inp.files[0],kind)};
    drop.ondragover=e=>{e.preventDefault();drop.classList.add("over")};
    drop.ondragleave=()=>drop.classList.remove("over");
    drop.ondrop=e=>{e.preventDefault();drop.classList.remove("over");if(e.dataTransfer.files[0])uploadAsset(ep,pg,e.dataTransfer.files[0],kind)};
    s.appendChild(drop);
  }
  return s;
}

async function uploadAsset(ep,pg,file,kind){
  setSave("saving","uploading…");
  const fd=new FormData();
  fd.append("episode",ep.num); fd.append("page",pg.page||0); fd.append("kind",kind); fd.append("file",file);
  try{
    const r=await fetch("/upload",{method:"POST",body:fd});
    const j=await r.json();
    if(!r.ok)throw new Error(j.error||"upload failed");
    pg.asset=j.asset; queueSave(); renderEpisode(ep);
  }catch(e){setSave("err",e.message);alert("Upload failed: "+e.message)}
}

function fields(ep,pg){
  const f=document.createElement("div"); f.className="fields";
  const mk=(label,key,opts={})=>{
    const w=document.createElement("div"); w.className="f";
    const l=document.createElement("label"); l.textContent=label; w.appendChild(l);
    let el;
    if(opts.area){el=document.createElement("textarea")}
    else if(opts.select){el=document.createElement("select");opts.select.forEach(o=>{const op=document.createElement("option");op.value=o;op.textContent=o||"—";el.appendChild(op)})}
    else{el=document.createElement("input")}
    el.value=pg[key]||""; if(opts.ph)el.placeholder=opts.ph; if(opts.cls)el.className=opts.cls;
    el.oninput=()=>{pg[key]=el.value;queueSave()};
    if(opts.select)el.onchange=()=>{pg[key]=el.value;queueSave()};
    w.appendChild(el); return w;
  };
  const r1=document.createElement("div"); r1.className="row";
  r1.append(mk("Timecode","time",{ph:"0:00–0:08"}),mk("Shot type","shotType",{select:["",...SHOT_TYPES]}));
  f.appendChild(r1);
  f.appendChild(mk("Framing / camera","framing",{area:true,ph:"e.g. Tripod, MS of Bob at the grill, water behind"}));
  f.appendChild(mk("Action (what happens)","action",{area:true,ph:"What Bob does in this shot"}));
  f.appendChild(mk("Bob's line / VO","line",{area:true,ph:"Spoken line",cls:"line-in"}));
  const r2=document.createElement("div"); r2.className="row";
  r2.append(mk("On-screen text","onScreenText",{ph:"lower-third / safety card"}),mk("Grill state","grillState",{select:Object.keys(GS_LABELS)}));
  f.appendChild(r2);
  // vertical + notes
  const cr=document.createElement("label"); cr.className="checkrow";
  const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=!!pg.vertical;
  cb.onchange=()=>{pg.vertical=cb.checked;queueSave();renderEpisode(ep)};
  cr.append(cb,document.createTextNode("⭐ Grab a vertical 9:16 of this moment (the best beat for Shorts/Reels)"));
  f.appendChild(cr);
  f.appendChild(mk("Notes","notes",{area:true,ph:"lav mic, golden hour, get B-roll…"}));
  return f;
}

function renumber(ep){ep.pages.forEach((p,i)=>p.page=i+1)}

/* ---------- Master shot list ---------- */
function renderShotList(){
  const v=document.getElementById("view"); v.innerHTML="";
  const sl=DATA.shotList||{};
  const head=document.createElement("div"); head.className="sl-head";
  head.innerHTML=`<div><h2>📋 Master Shot List</h2><div style="color:var(--muted);font-size:14px">${esc(DATA.location||"")} · ${esc(DATA.host||"")}</div></div>`;
  const pb=document.createElement("button"); pb.className="printbtn"; pb.textContent="🖨 Print / Save PDF";
  pb.onclick=()=>window.print(); head.appendChild(pb);
  v.appendChild(head);

  if(sl.gearReminder&&sl.gearReminder.length){
    const c=document.createElement("div"); c.className="callout";
    c.innerHTML="<h3>Before you roll</h3><ul>"+sl.gearReminder.map(g=>`<li>${esc(g)}</li>`).join("")+"</ul>";
    v.appendChild(c);
  }
  if(sl.shootingOrderNote){
    const c=document.createElement("div"); c.className="callout";
    c.innerHTML=`<h3>Shooting order</h3><div class="note">${esc(sl.shootingOrderNote)}</div>`;
    v.appendChild(c);
  }
  (sl.blocks||[]).forEach(blk=>{
    const wrap=document.createElement("div"); wrap.className="block";
    const h=document.createElement("h3");
    h.textContent="BLOCK "+(blk.id||"")+" — "+(blk.title||"")+(blk.grillState?"  ·  "+(GS_LABELS[blk.grillState]||blk.grillState):"");
    wrap.appendChild(h);
    const tbl=document.createElement("table"); tbl.className="shots";
    tbl.innerHTML=`<thead><tr>
      <th>Done</th><th>ID</th><th>Ep</th><th>Type</th><th>Framing</th><th>Action</th><th>Bob's line</th><th>9:16</th><th>Len</th></tr></thead>`;
    const tb=document.createElement("tbody");
    (blk.shots||[]).forEach(sh=>{
      const tr=document.createElement("tr");
      const eps=Array.isArray(sh.episodes)?sh.episodes.join(", "):(sh.episode||"");
      tr.innerHTML=`<td class="done"></td>
        <td class="id">${esc(sh.shotId||"")}</td>
        <td>${esc(String(eps))}</td>
        <td>${esc(sh.shotType||"")}</td>
        <td>${esc(sh.framing||"")}</td>
        <td>${esc(sh.action||"")}${sh.dependsOn?`<br><small style="color:var(--warn)">⚠ ${esc(sh.dependsOn)}</small>`:""}</td>
        <td><i>${esc(sh.line||"")}</i></td>
        <td class="v">${sh.vertical?"⭐":"—"}</td>
        <td>${esc(sh.duration||"")}</td>`;
      const dc=tr.querySelector("td.done");
      const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=!!sh.done;
      cb.onchange=()=>{sh.done=cb.checked;queueSave()};
      dc.appendChild(cb);
      tb.appendChild(tr);
    });
    tbl.appendChild(tb); wrap.appendChild(tbl); v.appendChild(wrap);
  });
}

/* ---------- save / utils ---------- */
function queueSave(){
  setSave("saving","saving…");
  clearTimeout(saveTimer);
  saveTimer=setTimeout(doSave,700);
}
async function doSave(){
  try{
    const r=await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(DATA)});
    if(!r.ok)throw new Error((await r.json()).error||"save failed");
    setSave("saved","saved ✓");
  }catch(e){setSave("err","save error")}
}
function setSave(cls,txt){const e=document.getElementById("saveState");e.className=cls;e.textContent=txt}
function mkbtn(txt,fn){const b=document.createElement("button");b.textContent=txt;b.onclick=fn;return b}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

load();
</script>
